name: build-app-data

# パイプライン成果物（public/data/）からアプリ同梱用データ（public/app-data/）を生成しコミットする。
# 手動実行（workflow_dispatch）。第3段・第4段を更新したら回す。
on:
  workflow_dispatch:
    inputs:
      shards:
        description: "判例本文の分割数（既定 50）"
        required: true
        default: "50"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: build app data
        env:
          SHARDS: ${{ github.event.inputs.shards }}
        run: python scripts/build_app_data.py
      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/app-data
          git commit -m "build: regenerate app-data (index + case shards)" || { echo "変更なし"; exit 0; }
          git pull --rebase
          git push
