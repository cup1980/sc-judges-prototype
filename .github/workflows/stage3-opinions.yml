name: stage3-opinions

# 第3段：XserverのPDFから個別意見を抽出。1回 BATCH 件ずつ。既処理はスキップ。
# reset_needs_review=true のときだけ、先に needsReview=true を削除して再抽出する（3-2-A用）。
on:
  workflow_dispatch:
    inputs:
      batch:
        description: "1回に処理する件数（既定2000）"
        required: false
        default: "2000"
      sleep:
        description: "各PDF取得の間隔秒（既定0.5）"
        required: false
        default: "0.5"
      reset_needs_review:
        description: "needsReview=true を削除して再抽出するか（通常 false。3-2-A実行時のみ true）"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  stage3:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pdfminer.six

      - name: Reset needsReview (3-2-A only)
        if: ${{ inputs.reset_needs_review == 'true' }}
        run: python scripts/reset_needsreview.py

      - name: Run stage3 (extract opinions)
        env:
          PDF_BASE: "https://cup1980.xsrv.jp/pdf/"
          BATCH: ${{ inputs.batch }}
          SLEEP: ${{ inputs.sleep }}
        run: python scripts/scraper_stage3_full.py

      - name: Upload result as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-result
          path: |
            public/data/opinions_detail.json
            public/data/recheck_after_patch.json
          retention-days: 14

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/opinions_detail.json public/data/recheck_after_patch.json
          if git diff --staged --quiet; then
            echo "変更なし。"
          else
            git commit -m "chore: stage3 opinions (batch) [skip ci]"
            for i in $(seq 1 5); do
              git pull --rebase origin main && git push origin main && exit 0
              echo "retry $i/5..."; sleep 10
            done
            exit 1
          fi
