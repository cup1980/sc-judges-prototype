name: scrape-saikosai-stage1

# 実行タイミング
on:
  workflow_dispatch:        # GitHubの画面から手動でも実行できる（まずはこれで動作確認）
  schedule:
    - cron: "0 18 * * 0"    # 毎週日曜 18:00(UTC) = 月曜 3:00(JST) に自動実行

# JSONをリポジトリにコミットするための書き込み権限
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      # 1) リポジトリのコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Python をセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3) 必要ライブラリをインストール
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # 4) クローラを実行（出力先を public/data に固定）
      - name: Run scraper (stage1)
        run: |
          mkdir -p public/data
          python scripts/scraper_stage1.py
          # スクリプトはカレントに opinions_list_stage1.json を吐くので public/data へ移動
          mv opinions_list_stage1.json public/data/opinions_list_stage1.json

      # 5) 差分があれば自動コミット＆プッシュ（→ Vercelが自動再デプロイ）
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/opinions_list_stage1.json
          if git diff --staged --quiet; then
            echo "変更なし。コミットしません。"
          else
            git commit -m "chore: update opinions_list_stage1.json [skip ci]"
            git push
          fi
